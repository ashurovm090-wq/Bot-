<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mukha VPN</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050a0a;
            --card-bg: #111111;
            --accent-cyan: #00f2ff;
            --text-main: #ffffff;
            --text-gray: #666666;
            --accent-gold: #c5a059;
        }

        body {
            background: radial-gradient(circle at center top, #003333 0%, var(--bg-color) 70%);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Шапка */
        .header { text-align: center; margin: 30px 0 40px; }
        .m-logo { font-size: 80px; font-weight: 900; line-height: 1; margin: 0; }
        .brand-name { font-size: 18px; letter-spacing: 4px; font-weight: 700; margin-top: 5px; }

        /* Карточка кабинета */
        .profile-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 350px;
            border-radius: 25px;
            padding: 25px;
            box-sizing: border-box;
            margin-bottom: 25px;
        }

        .user-title { font-size: 24px; font-weight: 700; margin-bottom: 25px; }
        .data-grid { display: flex; justify-content: space-between; align-items: flex-end; }
        
        .data-item .label { color: var(--text-gray); font-size: 13px; margin-bottom: 5px; }
        .data-item .value { font-size: 20px; font-weight: 900; }
        .sub-status { color: var(--accent-gold); font-size: 11px; font-weight: 700; text-transform: uppercase; margin-top: 5px; }

        /* Кнопки */
        .btn-stack { width: 100%; max-width: 350px; display: flex; flex-direction: column; gap: 12px; }

        .btn {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: var(--text-main);
            transition: 0.2s;
        }

        .btn:active { transform: scale(0.97); background: rgba(255,255,255,0.1); }
        
        .btn.primary { background: var(--accent-cyan); color: #000; font-weight: 700; }

        .btn-left { display: flex; align-items: center; gap: 15px; }
        .btn-icon { font-size: 20px; }
        .btn-arrow { opacity: 0.4; font-size: 14px; }

    </style>
</head>
<body>

    <div class="header">
        <div class="m-logo">M</div>
        <div class="brand-name">MUKHAVPN</div>
    </div>

    <div class="profile-card">
        <div class="user-title" id="display_name">~Мага</div>
        <div class="data-grid">
            <div class="data-item">
                <div class="label">Баланс</div>
                <div class="value" id="user_balance">0₽</div>
            </div>
            <div class="data-item" style="text-align: right;">
                <div class="label" id="expiry_date">Дата не определена</div>
                <div class="sub-status" id="sub_text">Проверка...</div>
            </div>
        </div>
    </div>

    <div class="btn-stack">
        <a href="#" class="btn primary" onclick="handleAction('buy')">
            <div class="btn-left">
                <span class="btn-icon">💳</span>
                <span>Купить подписку</span>
            </div>
            <span class="btn-arrow">❯</span>
        </a>

        <a href="#" class="btn" onclick="handleAction('setup')">
            <div class="btn-left">
                <span class="btn-icon">📩</span>
                <span>Установка и настройка</span>
            </div>
            <span class="btn-arrow">❯</span>
        </a>

        <a href="#" class="btn" onclick="handleAction('support')">
            <div class="btn-left">
                <span class="btn-icon">🎧</span>
                <span>Поддержка</span>
            </div>
            <span class="btn-arrow">❯</span>
        </a>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // 1. Устанавливаем актуальное имя
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('display_name').innerText = '~' + tg.initDataUnsafe.user.first_name;
        }

        // 2. Пример того, как ты можешь менять данные через JS
        // В будущем эти данные можно получать из твоего бота (Python)
        const userData = {
            balance: "150₽",
            expiry: "до 15 июня 2026",
            isActive: true
        };

        document.getElementById('user_balance').innerText = userData.balance;
        document.getElementById('expiry_date').innerText = userData.expiry;
        document.getElementById('sub_text').innerText = userData.isActive ? "ПОДПИСКА АКТИВНА" : "НЕ ОПЛАЧЕНО";

        function handleAction(type) {
            tg.HapticFeedback.impactOccurred('medium');
            if(type === 'buy') tg.sendData("click_buy");
            if(type === 'setup') alert("Инструкция отправлена в чат!");
        }
    </script>
</body>
</html>
