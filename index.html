<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MukhaVPN</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0b0c;
            --card-bg: #161b1d;
            --accent-color: #00f2ff; /* Бирюзовый как на примере */
            --text-main: #ffffff;
            --text-secondary: #82868a;
        }

        body {
            background: radial-gradient(circle at top right, #004d4d 0%, var(--bg-color) 60%);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Логотип */
        .header { margin: 20px 0 40px; text-align: center; }
        .logo-m { font-size: 80px; font-weight: 900; line-height: 1; margin: 0; }
        .brand { font-size: 18px; letter-spacing: 3px; font-weight: 700; margin-top: -5px; }

        /* Карточка профиля */
        .user-card {
            background: var(--card-bg);
            width: 100%;
            border-radius: 28px;
            padding: 25px;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .user-name { font-size: 24px; font-weight: 700; margin-bottom: 20px; }
        
        .info-row { display: flex; justify-content: space-between; align-items: flex-end; }
        .info-item .label { color: var(--text-secondary); font-size: 14px; margin-bottom: 5px; }
        .info-item .value { font-size: 20px; font-weight: 700; }
        .status-active { color: #ffcc00; font-size: 12px; text-transform: uppercase; margin-top: 4px; display: block; }

        /* Кнопки действий */
        .menu-list { width: 100%; display: flex; flex-direction: column; gap: 12px; }
        
        .menu-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: var(--text-main);
            text-decoration: none;
            transition: 0.2s;
        }

        .menu-btn:active { background: rgba(255,255,255,0.1); transform: scale(0.98); }
        .menu-btn.primary { background: var(--accent-color); color: #000; border: none; font-weight: 700; }
        
        .btn-content { display: flex; align-items: center; gap: 15px; }
        .icon { font-size: 20px; }
        .arrow { opacity: 0.5; }

    </style>
</head>
<body>

    <div class="header">
        <div class="logo-m">M</div>
        <div class="brand">MUKHAVPN</div>
    </div>

    <div class="user-card">
        <div class="user-name" id="user_name">Пользователь</div>
        <div class="info-row">
            <div class="info-item">
                <div class="label">Баланс</div>
                <div class="value">0₽</div>
            </div>
            <div class="info-item" style="text-align: right;">
                <div class="label">До 10 мая 2026</div>
                <span class="status-active">подписка активна</span>
            </div>
        </div>
    </div>

    <div class="menu-list">
        <a href="#" class="menu-btn primary" onclick="tgAction('buy')">
            <div class="btn-content">
                <span class="icon">💳</span>
                <span>Купить подписку</span>
            </div>
            <span class="arrow">❯</span>
        </a>
        
        <a href="#" class="menu-btn" onclick="copyKey()">
            <div class="btn-content">
                <span class="icon">📥</span>
                <span>Установка и настройка</span>
            </div>
            <span class="arrow">❯</span>
        </a>

        <a href="#" class="menu-btn" onclick="tgAction('support')">
            <div class="btn-content">
                <span class="icon">🎧</span>
                <span>Поддержка</span>
            </div>
            <span class="arrow">❯</span>
        </a>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = "#004d4d";
        
        // Берем имя из телеги
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('user_name').innerText = tg.initDataUnsafe.user.first_name;
        }

        function copyKey() {
            const dummyKey = "vless://your-id@your-ip:8443?security=reality...";
            navigator.clipboard.writeText(dummyKey);
            tg.HapticFeedback.notificationOccurred('success');
            alert("Ключ скопирован в буфер обмена!");
        }

        function tgAction(type) {
            tg.HapticFeedback.impactOccurred('light');
            if(type === 'buy') tg.sendData("action_buy");
            if(type === 'support') tg.close(); // Или любая другая логика
        }
    </script>
</body>
</html>
